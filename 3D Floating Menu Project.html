<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Floating Menu | codingbymohit</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
        <style>
            *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
    overflow:hidden;
}

/* Floating Glow */
body::before{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:#00f7ff;
    border-radius:50%;
    filter:blur(150px);
    opacity:.3;
}

.menu-container{
    position:relative;
    width:220px;
    height:220px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.toggle{
    position:absolute;
    width:80px;
    height:80px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(15px);
    border:2px solid rgba(255,255,255,.2);
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    color:#fff;
    font-size:2rem;
    z-index:100;
    box-shadow:
        0 15px 35px rgba(0,0,0,.4),
        inset 0 0 15px rgba(255,255,255,.1);
    transition:.8s;
    transform-style:preserve-3d;
}

.menu-container.active .toggle{
    transform:rotate(315deg) scale(1.1);
}

.menu{
    position:relative;
    width:100%;
    height:100%;
}

.menu li{
    position:absolute;
    left:50%;
    top:50%;
    list-style:none;
    transform:
        translate(-50%,-50%)
        rotate(calc(60deg * var(--i)))
        translateX(0);

    transition:.8s;
    transition-delay:calc(.08s * var(--i));
}

.menu-container.active li{
    transform:
        translate(-50%,-50%)
        rotate(calc(60deg * var(--i)))
        translateX(95px);
}

.menu li a{
    position:relative;
    width:60px;
    height:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:#fff;
    font-size:1.4rem;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.2);
    border-radius:20px;

    transform:
        rotate(calc(-60deg * var(--i)))
        rotateY(25deg);

    box-shadow:
        0 10px 20px rgba(0,0,0,.3),
        inset 0 2px 10px rgba(255,255,255,.1);

    transition:.4s;
}

.menu li a:hover{
    transform:
        rotate(calc(-60deg * var(--i)))
        rotateY(0deg)
        translateY(-10px);

    background:#00f7ff;
    color:#000;

    box-shadow:
        0 0 30px #00f7ff,
        0 0 60px #00f7ff;
}

.menu li a::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:20px;
    background:linear-gradient(
        135deg,
        rgba(255,255,255,.4),
        transparent
    );
}

@media(max-width:500px){

    .menu-container{
        transform:scale(.8);
    }
}
        </style>
</head>
<body>

    <div class="menu-container">

        <div class="toggle">
            <i class="fas fa-plus"></i>
        </div>

        <ul class="menu">
            <li style="--i:0;">
                <a href="#"><i class="fas fa-house"></i></a>
            </li>

            <li style="--i:1;">
                <a href="#"><i class="fas fa-user"></i></a>
            </li>

            <li style="--i:2;">
                <a href="#"><i class="fas fa-code"></i></a>
            </li>

            <li style="--i:3;">
                <a href="#"><i class="fas fa-camera"></i></a>
            </li>

            <li style="--i:4;">
                <a href="#"><i class="fas fa-envelope"></i></a>
            </li>

            <li style="--i:5;">
                <a href="#"><i class="fas fa-gear"></i></a>
            </li>
        </ul>

    </div>

    <script>
        const menu = document.querySelector(".menu-container");
const toggle = document.querySelector(".toggle");

toggle.addEventListener("click", () => {
    menu.classList.toggle("active");
});
    </script>
</body>
</html>
